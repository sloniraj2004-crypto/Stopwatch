<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>
  <div class="bg-shape shape3"></div>

  <div class="stopwatch">
    <p class="subheading">Time Tracker</p>
    <h2 class="title">Stopwatch</h2>

    <div class="time-ring">
      <h1 id="displayTime">00:00:00</h1>
    </div>

    <div class="status-text" id="statusText">Ready to start</div>

    <div class="buttons">
      <div class="btn-box stop-btn" onclick="watchStop()" title="Stop">
        <img src="images/stop.png" alt="Stop" />
      </div>

      <div class="btn-box main-btn" onclick="toggleWatch()" title="Start / Pause">
        <img id="startPauseBtn" src="images/start.png" alt="Start Pause" />
      </div>

      <div class="btn-box reset-btn" onclick="watchReset()" title="Reset">
        <img src="images/reset.png" alt="Reset" />
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
